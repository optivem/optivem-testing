name: Java Release Stage

on:
  workflow_dispatch:
    inputs:
      rc_version:
        description: 'RC version to promote (e.g., 1.0.5-rc.47, or leave blank for latest RC)'
        required: false
        type: string
  workflow_call:
    inputs:
      rc_version:
        description: 'RC version to promote (e.g., 1.0.5-rc.47, or leave blank for latest RC)'
        required: false
        type: string
    outputs:
      release-version:
        description: 'The release version that was published'
        value: ${{ jobs.promote-rc-to-release.outputs.release-version }}
      rc-version:
        description: 'The RC version that was promoted'
        value: ${{ jobs.promote-rc-to-release.outputs.rc-version }}
    secrets:
      SONATYPE_USERNAME:
        required: true
      SONATYPE_PASSWORD:
        required: true
      GPG_PRIVATE_KEY:
        required: true
      GPG_PASSPHRASE:
        required: true

jobs:
  promote-rc-to-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    permissions:
      contents: read
      packages: write
    outputs:
      release-version: ${{ steps.validate.outputs.release-version }}
      rc-version: ${{ steps.find-rc.outputs.rc-version }}

    env:
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Find latest RC version if not provided
      id: find-rc
      uses: ./.github/actions/find-latest-maven-rc-version
      with:
        rc-version: ${{ inputs.rc_version }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        package-name: 'com.optivem.optivem-testing'

    - name: Extract release version
      id: validate
      uses: optivem/extract-release-version-action@v1
      with:
        prerelease-version: ${{ steps.find-rc.outputs.rc-version }}

    - name: Check if Maven package version exists
      uses: ./.github/actions/check-maven-package-exists
      with:
        release-version: ${{ steps.validate.outputs.release-version }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}

    - name: Download RC artifacts
      uses: ./.github/actions/download-maven-rc-artifacts
      with:
        rc-version: ${{ steps.find-rc.outputs.rc-version }}
        github-username: ${{ github.actor }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Prepare release artifacts
      uses: ./.github/actions/prepare-maven-release-artifacts
      with:
        rc-version: ${{ steps.find-rc.outputs.rc-version }}
        release-version: ${{ steps.validate.outputs.release-version }}

    - name: Upload release to Maven Central
      id: upload
      uses: ./.github/actions/publish-maven-central
      with:
        release-version: ${{ steps.validate.outputs.release-version }}
        gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
        gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

    - name: Wait for deployment validation
      uses: ./.github/actions/wait-for-deployment-validation
      with:
        deployment-id: ${{ steps.upload.outputs.deployment-id }}
        expected-state: 'VALIDATED'
        max-attempts: '60'
        poll-interval: '10'

    - name: Publish deployment on Maven Central
      uses: ./.github/actions/publish-central-deployment
      with:
        deployment-id: ${{ steps.upload.outputs.deployment-id }}
        release-version: ${{ steps.validate.outputs.release-version }}

    - name: Wait for publishing to start
      uses: ./.github/actions/wait-for-deployment-validation
      with:
        deployment-id: ${{ steps.upload.outputs.deployment-id }}
        expected-state: 'PUBLISHING'
        max-attempts: '60'
        poll-interval: '10'

    - name: Wait for publishing to complete
      uses: ./.github/actions/wait-for-deployment-validation
      with:
        deployment-id: ${{ steps.upload.outputs.deployment-id }}
        expected-state: 'PUBLISHED'
        max-attempts: '120'
        poll-interval: '60'

    - name: Wait for Maven Central availability
      uses: ./.github/actions/wait-for-maven-central
      with:
        release-version: ${{ steps.validate.outputs.release-version }}
        max-attempts: '120'
        poll-interval: '60'

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Run release smoke tests (Maven Central)
      run: |
        echo "🧪 Running release smoke tests..."
        ./gradlew system-test:smoke-test-release:test --no-daemon -Pversion="${{ steps.validate.outputs.release-version }}"

    - name: Create release summary
      run: |
        echo "## ✅ Java Release Stage Completed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Release Version:** \`${{ steps.validate.outputs.release-version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Promoted from RC:** \`${{ steps.find-rc.outputs.rc-version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🚀 **Release Activities:**" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Downloaded RC artifacts from GitHub Packages" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Uploaded and published to Maven Central" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Ran release smoke tests" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Maven Central:** https://central.sonatype.com/artifact/com.optivem/optivem-testing/${{ steps.validate.outputs.release-version }}" >> $GITHUB_STEP_SUMMARY
