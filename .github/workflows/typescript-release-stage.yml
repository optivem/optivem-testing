name: TypeScript Release Stage

on:
  workflow_dispatch:
    inputs:
      rc_version:
        description: 'RC version to promote (e.g., 1.0.1-rc.47, or leave blank for latest RC)'
        required: false
        type: string
  workflow_call:
    inputs:
      rc_version:
        description: 'RC version to promote (e.g., 1.0.1-rc.47, or leave blank for latest RC)'
        required: false
        type: string
    outputs:
      release-version:
        description: 'The release version that was published'
        value: ${{ jobs.promote-rc-to-release.outputs.release-version }}
      rc-version:
        description: 'The RC version that was promoted'
        value: ${{ jobs.promote-rc-to-release.outputs.rc-version }}
    secrets:
      NPM_TOKEN:
        required: true

jobs:
  promote-rc-to-release:
    name: Promote RC to Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    permissions:
      contents: read
      packages: read
    outputs:
      release-version: ${{ steps.version.outputs.release-version }}
      rc-version: ${{ steps.find-rc.outputs.rc-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Find latest RC version if not provided
        id: find-rc
        uses: ./.github/actions/find-latest-npm-rc-version
        with:
          rc-version: ${{ inputs.rc_version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release version
        id: version
        run: |
          RC_VERSION="${{ steps.find-rc.outputs.rc-version }}"
          RELEASE_VERSION=$(echo "$RC_VERSION" | sed 's/-rc\.[0-9]*$//')
          echo "release-version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $RELEASE_VERSION"

      - name: Download RC package from GitHub Packages
        uses: ./.github/actions/download-npm-rc-artifacts
        with:
          rc-version: ${{ steps.find-rc.outputs.rc-version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release artifacts
        uses: ./.github/actions/prepare-npm-release-artifacts
        with:
          rc-version: ${{ steps.find-rc.outputs.rc-version }}
          release-version: ${{ steps.version.outputs.release-version }}

      - name: Publish to npm
        uses: ./.github/actions/publish-npm
        with:
          package-path: /tmp/rc-artifacts/optivem-optivem-testing-${{ steps.version.outputs.release-version }}.tgz
          npm-token: ${{ secrets.NPM_TOKEN }}

      - name: Wait for npm availability
        uses: ./.github/actions/wait-for-npm-availability
        with:
          release-version: ${{ steps.version.outputs.release-version }}

      - name: Run release smoke tests (npm)
        working-directory: typescript/system-test/smoke-test-release
        run: |
          npm install @optivem/optivem-testing@${{ steps.version.outputs.release-version }} --prefer-online
          echo "✅ Successfully resolved release package from npm"
          npm test

      - name: Create release summary
        run: |
          echo "## ✅ TypeScript Release Stage Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release Version:** \`${{ steps.version.outputs.release-version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Promoted from RC:** \`${{ steps.find-rc.outputs.rc-version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 **Release Activities:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Downloaded RC package from GitHub Packages" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Repacked with release version (same artifacts, no rebuild)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Published to npm" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Ran release smoke tests against npm" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**npm Package:** https://www.npmjs.com/package/@optivem/optivem-testing/v/${{ steps.version.outputs.release-version }}" >> $GITHUB_STEP_SUMMARY
