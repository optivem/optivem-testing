name: One Click Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.0). Leave blank to auto-increment patch.'
        required: false
        type: string

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      commit-sha: ${{ steps.push.outputs.commit-sha }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Resolve version
        id: resolve
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            CURRENT=$(tr -d '[:space:]' < VERSION)
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "Auto-incremented patch: $CURRENT -> $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump version
        run: |
          echo "${{ steps.resolve.outputs.version }}" > VERSION
          bash scripts/bump-version.sh

      - name: Commit and push
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION dotnet/Directory.Build.props java/build.gradle typescript/package.json
          git commit -m "Bump version to ${{ steps.resolve.outputs.version }}"
          git push
          echo "commit-sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  wait-for-java-commit-stage:
    needs: bump-version
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Wait for commit stages to start
        run: sleep 30

      - name: Wait for Java Commit Stage
        uses: optivem/actions/wait-for-commit-run@main
        with:
          workflow: java-commit-stage.yml
          commit-sha: ${{ needs.bump-version.outputs.commit-sha }}

  wait-for-dotnet-commit-stage:
    needs: bump-version
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Wait for commit stages to start
        run: sleep 30

      - name: Wait for .NET Commit Stage
        uses: optivem/actions/wait-for-commit-run@main
        with:
          workflow: dotnet-commit-stage.yml
          commit-sha: ${{ needs.bump-version.outputs.commit-sha }}

  wait-for-typescript-commit-stage:
    needs: bump-version
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Wait for commit stages to start
        run: sleep 30

      - name: Wait for TypeScript Commit Stage
        uses: optivem/actions/wait-for-commit-run@main
        with:
          workflow: typescript-commit-stage.yml
          commit-sha: ${{ needs.bump-version.outputs.commit-sha }}

  run-acceptance-stage:
    needs: [wait-for-java-commit-stage, wait-for-dotnet-commit-stage, wait-for-typescript-commit-stage]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Trigger and wait for Acceptance Stage
        uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: acceptance-stage.yml
          poll-interval: '300'

  trigger-release-stage:
    needs: [run-acceptance-stage, bump-version]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Trigger and wait for Release Stage
        uses: optivem/actions/trigger-and-wait@main
        with:
          workflow: release-stage.yml
          poll-interval: '300'

      - name: Display summary
        run: |
          echo "## Release ${{ needs.bump-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version bump | Done |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit stages | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Acceptance stage | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Release stage | Passed |" >> $GITHUB_STEP_SUMMARY
