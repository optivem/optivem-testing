name: .NET Release Stage

on:
  workflow_dispatch:
    inputs:
      rc_version:
        description: 'RC version to promote (e.g., 1.0.0-rc.47, or leave blank for latest RC)'
        required: false
        type: string
  workflow_call:
    inputs:
      rc_version:
        description: 'RC version to promote (e.g., 1.0.0-rc.47, or leave blank for latest RC)'
        required: false
        type: string
    outputs:
      release-version:
        description: 'The release version that was published'
        value: ${{ jobs.promote-rc-to-release.outputs.release-version }}
      rc-version:
        description: 'The RC version that was promoted'
        value: ${{ jobs.promote-rc-to-release.outputs.rc-version }}
    secrets:
      NUGET_API_KEY:
        required: true

jobs:
  promote-rc-to-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dotnet
    permissions:
      contents: read
      packages: read
    outputs:
      release-version: ${{ steps.validate.outputs.release-version }}
      rc-version: ${{ steps.find-rc.outputs.rc-version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Find latest RC version if not provided
      id: find-rc
      uses: ./.github/actions/find-latest-nuget-rc-version
      with:
        rc-version: ${{ inputs.rc_version }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        package-name: 'Optivem.Testing'

    - name: Extract release version from prerelease
      id: validate
      uses: optivem/extract-release-version-action@v1
      with:
        prerelease-version: ${{ steps.find-rc.outputs.rc-version }}

    - name: Check if release version already exists on NuGet.org
      uses: ./.github/actions/check-nuget-package-exists
      with:
        release-version: ${{ steps.validate.outputs.release-version }}
        package-name: 'Optivem.Testing'

    - name: Download RC package from GitHub Packages
      uses: ./.github/actions/download-nuget-rc-artifacts
      with:
        rc-version: ${{ steps.find-rc.outputs.rc-version }}
        github-username: ${{ github.actor }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        package-name: 'Optivem.Testing'

    - name: Repack with release version
      uses: ./.github/actions/prepare-nuget-release-artifacts
      with:
        rc-version: ${{ steps.find-rc.outputs.rc-version }}
        release-version: ${{ steps.validate.outputs.release-version }}
        package-name: 'Optivem.Testing'

    - name: Publish to NuGet.org
      uses: ./.github/actions/publish-nuget
      with:
        package-path: './temp-release/Optivem.Testing.${{ steps.validate.outputs.release-version }}.nupkg'
        nuget-api-key: ${{ secrets.NUGET_API_KEY }}

    - name: Wait for NuGet.org indexing
      uses: ./.github/actions/wait-for-nuget-indexing
      with:
        package-name: 'Optivem.Testing'
        version: ${{ steps.validate.outputs.release-version }}
        max-retries: '30'
        interval-seconds: '10'

    - name: Restore release smoke test dependencies (retry)
      uses: ./.github/actions/dotnet-restore-with-retry
      with:
        project-path: dotnet/SystemTest/Optivem.Testing.SystemTest.SmokeTestRelease/Optivem.Testing.SystemTest.SmokeTestRelease.csproj
        version: ${{ steps.validate.outputs.release-version }}
        max-retries: '5'
        interval-seconds: '30'

    - name: Run release smoke tests (NuGet.org)
      run: |
        echo "🧪 Running release smoke tests..."
        dotnet test SystemTest/Optivem.Testing.SystemTest.SmokeTestRelease/Optivem.Testing.SystemTest.SmokeTestRelease.csproj --no-restore -p:Version="${{ steps.validate.outputs.release-version }}"

    - name: Create release summary
      run: |
        echo "## ✅ .NET Release Stage Completed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Release Version:** \`${{ steps.validate.outputs.release-version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Promoted from RC:** \`${{ steps.find-rc.outputs.rc-version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🚀 **Release Activities:**" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Downloaded RC package from GitHub Packages" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Repacked and published to NuGet.org" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Waited for NuGet.org indexing" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Ran release smoke tests" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**NuGet Package:** https://www.nuget.org/packages/Optivem.Testing/${{ steps.validate.outputs.release-version }}" >> $GITHUB_STEP_SUMMARY
